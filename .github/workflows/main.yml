name: Organization Profile Updater

on:
  schedule:
    # 19:40 UTC is 03:40 AM China Standard Time
    - cron: '40 19 * * *'
  workflow_dispatch: 

env:
  # Mandatory for 2026 Node compatibility
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-members:
    # Targeting the new cost-efficient 1-vCPU runner
    runs-on: ubuntu-slim
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1 

      - name: Generate Member Table
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.YRPENG_E3DA_RO }} 
          script: |
            const org = 'e3da';
            const fs = require('fs');
            
            async function run() {
              // 1. Fetch all members with pagination
              const members = await github.paginate(github.rest.orgs.listMembers, {
                org: org,
                filter: 'all',
                per_page: 100
              });
              
              let memberRows = "| Member | Status | Portfolio |\n| :--- | :--- | :--- |\n";
              let count = 0;

              for (const member of members) {
                const { data: membership } = await github.rest.orgs.getMembershipForUser({
                  org,
                  username: member.login
                });

                // Filter for 'member' role (skips admins/owners)
                if (membership.role === 'member') {
                  const { data: user } = await github.rest.users.getByUsername({ username: member.login });
                  const site = user.blog ? user.blog : `https://${user.login}.github.io`;
                  const status = user.status?.emoji ? `${user.status.emoji} ${user.status.message || ''}` : "Active";
                  
                  memberRows += `| **${user.name || user.login}** | ${status} | [Visit Portfolio](${site}) |\n`;
                  count++;
                }
              }

              if (count === 0) memberRows += "| No members found | - | - |\n";

              // 2. Build README from Head file
              const headPath = 'profile/RM-head.md';
              const readmePath = 'profile/README.md';

              if (fs.existsSync(headPath)) {
                const header = fs.readFileSync(headPath, 'utf8');
                const finalContent = `${header}\n\n${memberRows}\n\n*Last updated: ${new Date().toUTCString()} (via ubuntu-slim)*`;
                fs.writeFileSync(readmePath, finalContent);
              } else {
                console.error("RM-head.md not found. Rebuilding skipped.");
              }
            }

            await run();

      - name: Commit and Force Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add profile/README.md
          
          # Only push if the member list actually changed
          if git diff --staged --quiet; then
            echo "No changes in member list."
            exit 0
          fi

          git commit -m "chore: nightly update via ubuntu-slim"
          git push origin main --force
